name: Direct Deploy to Project Folder

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy-job:
    # ТОВА Е НАЙ-ВАЖНОТО: Казва на GitHub да ползва твоя инсталиран рънер
    runs-on: self-hosted
    
    steps:
      - name: Git Pull Latest Changes
        run: |
          cd /ssd/docker/upload_articles/upload_article
          git pull origin master

      - name: Install Dependencies
        run: |
          cd /ssd/docker/upload_articles/upload_article
          npm install

      - name: Run Lint
        run: |
          cd /ssd/docker/upload_articles/upload_article
          CI=false npm run lint

      - name: Build Frontend
        run: |
          cd /ssd/docker/upload_articles/upload_article
          CI=false npm run build

      - name: Docker Compose Deploy
        run: |
          cd /ssd/docker/upload_articles/upload_article
          docker compose pull
          docker compose up -d --build

      - name: Health Check
        run: |
          echo "Checking application health..."
          # Провери дали проектът ти наистина е на порт 8080!
          for i in 1 2 3 4 5; do
            if curl -fsS http://localhost:8080 > /dev/null; then
              echo "✅ App is ONLINE!"
              exit 0
            fi
            echo "Waiting for container..."
            sleep 10
          done
          echo "❌ Health check FAILED!"
          exit 1

  notify:
    # Известията могат да се пращат от стандартен GitHub сървър
    runs-on: ubuntu-latest
    needs: deploy-job
    if: always()
    steps:
      - name: Send Telegram Notification
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ needs.deploy-job.result == 'success' && '✅' || '❌' }} Deployment: ${{ github.repository }}
            Status: ${{ needs.deploy-job.result }}
            Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
