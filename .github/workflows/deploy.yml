name: Deploy with SHA Tagging and Rollback

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: production-deployexit
  cancel-in-progress: false

jobs:
  ci:
    runs-on: self-hosted
    steps:
      - name: Git Pull Latest Changes
        run: |
          cd /ssd/docker/upload_articles/upload_article
          git pull origin master

      - name: Install Dependencies
        run: |
          cd /ssd/docker/upload_articles/upload_article
          npm install

      - name: Run Lint
        run: |
          cd /ssd/docker/upload_articles/upload_article
          CI=false npm run lint

      - name: Build Frontend
        run: |
          cd /ssd/docker/upload_articles/upload_article
          CI=false npm run build

  deploy:
    needs: ci
    runs-on: self-hosted
    steps:
      - name: Build Docker Images with SHA Tag
        run: |
          cd /ssd/docker/upload_articles/upload_article
          echo "Building images with tag: ${{ github.sha }}"
          docker build -t upload-be-prod:${{ github.sha }} ./server
          docker build -t upload-fe-prod:${{ github.sha }} .
          # Also tag as latest for manual use
          docker tag upload-be-prod:${{ github.sha }} upload-be-prod:latest
          docker tag upload-fe-prod:${{ github.sha }} upload-fe-prod:latest

      - name: Deploy with SHA-Tagged Images
        run: |
          cd /ssd/docker/upload_articles/upload_article
          APP_IMAGE_TAG=${{ github.sha }} docker compose up -d

  healthcheck_and_rollback:
    needs: deploy
    runs-on: self-hosted
    steps:
      - name: Health Check
        id: health_check
        run: |
          cd /ssd/docker/upload_articles/upload_article
          echo "Waiting for containers to start..."
          sleep 20

          SUCCESS=false
          for i in {1..6}; do
            if curl -fsS http://localhost:3500 > /dev/null; then
              echo "✅ Health check passed on attempt $i"
              SUCCESS=true
              break
            fi
            echo "Attempt $i: Port 3500 not responding yet..."
            sleep 10
          done

          if [ "$SUCCESS" = true ]; then
            echo "${{ github.sha }}" > /ssd/docker/upload_articles/upload_article/.last_stable_sha
            echo "✅ Stable SHA saved: ${{ github.sha }}"
            echo "deploy_result=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Health check FAILED after 6 attempts"
            docker compose logs --tail=50
            echo "deploy_result=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Rollback to Last Stable Image
        if: failure()
        run: |
          cd /ssd/docker/upload_articles/upload_article
          LAST_STABLE=$(cat .last_stable_sha 2>/dev/null || echo "")

          if [ -z "$LAST_STABLE" ]; then
            echo "❌ CRITICAL: No stable image found. Cannot rollback!"
            exit 1
          fi

          echo "⏪ Rolling back to stable SHA: $LAST_STABLE"
          APP_IMAGE_TAG=$LAST_STABLE docker compose up -d

          echo "Waiting for rollback containers to start..."
          sleep 20

          ROLLBACK_OK=false
          for i in {1..3}; do
            if curl -fsS http://localhost:3500 > /dev/null; then
              echo "✅ Rollback successful — app is running on $LAST_STABLE"
              ROLLBACK_OK=true
              break
            fi
            echo "Rollback attempt $i: Still not responding..."
            sleep 15
          done

          if [ "$ROLLBACK_OK" = false ]; then
            echo "🚨 CRITICAL: Rollback also failed! Manual intervention required."
          fi

          # Always exit with failure — the new deploy failed, even if rollback worked
          exit 1

  notify:
    needs: [ci, deploy, healthcheck_and_rollback]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Telegram Notification
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ (needs.ci.result == 'success' && needs.deploy.result == 'success' && needs.healthcheck_and_rollback.result == 'success') && '✅ Deploy SUCCESS' || '❌ Deploy FAILED' }}

            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            SHA: ${{ github.sha }}

            CI:              ${{ needs.ci.result }}
            Deploy:          ${{ needs.deploy.result }}
            Health/Rollback: ${{ needs.healthcheck_and_rollback.result }}

            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
