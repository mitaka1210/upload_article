name: Deploy with rollback

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --watch=false --passWithNoTests
        env:
          CI: true

      - name: Build frontend
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.SERVER_APP_PATH }}"
            git fetch --all
            git rev-parse HEAD > .last_stable_sha
            git checkout master
            git pull origin master
            docker compose pull
            docker compose up -d --build

  healthcheck_and_rollback:
    runs-on: ubuntu-latest
    needs: deploy
    outputs:
      # Резултатът се записва от runner-а (не от remote), затова е надежден
      status: ${{ steps.set_status.outputs.status }}
    steps:
      - name: Health check and rollback if needed
        id: remote
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          # script_stop: false — искаме да хванем exit кода сами
          script_stop: false
          script: |
            set -e
            cd "${{ secrets.SERVER_APP_PATH }}"
            # Уникален файл за този run — няма риск от стар резултат
            RESULT_FILE="/tmp/deploy_result_${{ github.run_id }}"
            rm -f "$RESULT_FILE"

            HEALTH_OK=0
            for i in 1 2 3 4 5; do
              if curl -fsS "${{ secrets.APP_HEALTHCHECK_URL }}" > /dev/null; then
                HEALTH_OK=1
                break
              fi
              sleep 10
            done

            if [ "$HEALTH_OK" -eq 1 ]; then
              echo "DEPLOY_STATUS=success" > "$RESULT_FILE"
              exit 0
            fi

            echo "Health check failed. Attempting rollback..."

            if [ ! -f .last_stable_sha ]; then
              echo "DEPLOY_STATUS=failure_no_rollback" > "$RESULT_FILE"
              exit 1
            fi

            PREVIOUS_SHA="$(cat .last_stable_sha)"
            echo "Rolling back to $PREVIOUS_SHA"
            git checkout "$PREVIOUS_SHA"
            docker compose up -d --build

            ROLLBACK_HEALTH_OK=0
            for i in 1 2 3 4 5; do
              if curl -fsS "${{ secrets.APP_HEALTHCHECK_URL }}" > /dev/null; then
                ROLLBACK_HEALTH_OK=1
                break
              fi
              sleep 10
            done

            git checkout master

            if [ "$ROLLBACK_HEALTH_OK" -eq 1 ]; then
              echo "DEPLOY_STATUS=rollback_success" > "$RESULT_FILE"
              exit 1
            fi

            echo "DEPLOY_STATUS=rollback_failure" > "$RESULT_FILE"
            exit 1

      - name: Read remote status file
        id: read_status
        # Винаги изпълняваме — дори ако remote стъпката е failed
        if: always()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: false
          script: cat /tmp/deploy_result_${{ github.run_id }} 2>/dev/null || echo "DEPLOY_STATUS=unknown"

      - name: Set output on runner
        id: set_status
        if: always()
        # Извличаме статуса от stdout на предишната стъпка и го записваме
        # като runner output — GITHUB_OUTPUT е наличен тук (не на remote хоста)
        run: |
          STATUS=$(echo "${{ steps.read_status.outputs.output }}" | grep DEPLOY_STATUS | cut -d= -f2 | tr -d '[:space:]')
          if [ -z "$STATUS" ]; then
            STATUS="unknown"
          fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

  notify:
    runs-on: ubuntu-latest
    needs: [ci, deploy, healthcheck_and_rollback]
    if: always()
    steps:
      - name: Send Telegram Notification on Success
        if: |
          needs.ci.result == 'success' &&
          needs.deploy.result == 'success' &&
          needs.healthcheck_and_rollback.outputs.status == 'success'
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Успешен deployment
            Проект: ${{ github.repository }}
            Бранч: ${{ github.ref_name }}
            Автор: ${{ github.actor }}
            Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}

      - name: Send Telegram Notification on Rollback Success
        if: |
          needs.healthcheck_and_rollback.outputs.status == 'rollback_success'
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ⚠️ Deployment failed — rollback успешен
            Проект: ${{ github.repository }}
            Бранч: ${{ github.ref_name }}
            Автор: ${{ github.actor }}
            Новият commit беше върнат автоматично към предишната стабилна версия.
            Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Telegram Notification on Failure
        if: |
          needs.ci.result != 'success' ||
          needs.deploy.result != 'success' ||
          needs.healthcheck_and_rollback.outputs.status == 'rollback_failure' ||
          needs.healthcheck_and_rollback.outputs.status == 'failure_no_rollback' ||
          needs.healthcheck_and_rollback.outputs.status == 'unknown'
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ Deployment failed
            Проект: ${{ github.repository }}
            Бранч: ${{ github.ref_name }}
            Автор: ${{ github.actor }}
            CI/Deploy/Healthcheck pipeline не е завършил успешно.
            Ако deployment е стартирал, rollback е опитан автоматично.
            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}